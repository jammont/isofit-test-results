name: Lake Mary Single Pixel

on:
  workflow_call:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extras
          path: ~/.isofit

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.25"
          python-version: "3.12"
          activate-environment: true

      - name: Install ISOFIT
        run: |
          uv add git+https://github.com/isofit/isofit --branch dev --extra plots

      - name: Execute tests
        run: |
          mkdir results

      - uses: actions/upload-artifact@v6
        with:
          name: lake_mary
          path: results
